<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Registro de Préstamos de Libros</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f2f4f8;
            padding: 40px 20px;
            color: #1e2a3e;
        }

        h1 {
            text-align: center;
            font-weight: 600;
            font-size: 1.9rem;
            color: #2c3e50;
            margin-bottom: 30px;
            letter-spacing: -0.3px;
        }

        form {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px 35px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: #1e293b;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 20px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 0.95rem;
            background-color: #fff;
            transition: all 0.1s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input[type="button"] {
            background-color: #1e3a5f;
            color: white;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s;
        }

        input[type="button"]:hover {
            background-color: #0f2b44;
        }

        #mensaje {
            max-width: 500px;
            margin: 25px auto 0;
            padding: 14px 18px;
            border-radius: 18px;
            background: #ffffffd9;
            text-align: center;
            font-size: 0.9rem;
            color: #2d3e50;
            border: 1px solid #e2edf2;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
    </style>
</head>
<body>
    <h1>Registro de Préstamos de Libros</h1>
    <form id="prestamoForm">
        <label for="nombre">Nombre del Estudiante:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label for="titulo">Título del Libro:</label>
        <input type="text" id="titulo" name="titulo" required><br><br>

        <label for="fecha_prestamo">Fecha de Préstamo:</label>
        <input type="date" id="fecha_prestamo" name="fecha_prestamo" required><br><br>

        <label for="fecha_devolucion">Fecha de Devolución:</label>
        <input type="date" id="fecha_devolucion" name="fecha_devolucion" required><br><br>

        <input type="button" value="Registrar Préstamo" onclick="registrarPrestamo()">
    </form>
    <div id="mensaje"></div>
    <script src="conexion.js"></script>
</body>
</html>
